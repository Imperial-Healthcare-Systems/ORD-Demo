<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ODR Platform · Imperial Tech Innovations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0F172A;
  --navy-2:#1E293B;
  --navy-3:#334155;
  --gold:#D4AF37;
  --gold-soft:#E8CC6B;
  --gold-deep:#B8941F;
  --bg:#F1F4F9;
  --surface:#FFFFFF;
  --line:#E2E8F0;
  --line-soft:#EEF2F7;
  --text:#0F172A;
  --muted:#64748B;
  --muted-2:#94A3B8;
  --emerald:#059669;
  --emerald-soft:#D1FAE5;
  --amber:#D97706;
  --amber-soft:#FEF3C7;
  --blue:#2563EB;
  --blue-soft:#DBEAFE;
  --red:#DC2626;
  --red-soft:#FEE2E2;
  --shadow:0 1px 3px rgba(15,23,42,.06),0 10px 30px -12px rgba(15,23,42,.12);
  --shadow-lg:0 20px 60px -20px rgba(15,23,42,.35);
  --radius:16px;
  --sans:'Plus Jakarta Sans',sans-serif;
  --serif:'Fraunces',serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  font-family:var(--sans);
  background:var(--bg);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  line-height:1.5;
  overflow:hidden;
}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:8px;border:2px solid var(--bg)}
::-webkit-scrollbar-thumb:hover{background:#94a3b8}

/* ====== APP SHELL ====== */
#app{height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* Top demo chrome bar */
.chrome{
  height:52px;flex-shrink:0;
  background:var(--navy);
  display:flex;align-items:center;gap:16px;
  padding:0 18px;color:#fff;z-index:200;
  border-bottom:1px solid rgba(255,255,255,.08);
}
.chrome .brand{display:flex;align-items:center;gap:9px;font-weight:800;letter-spacing:.2px;font-size:15px}
.chrome .brand .mark{
  width:30px;height:30px;border-radius:8px;
  background:linear-gradient(135deg,var(--gold),var(--gold-deep));
  display:flex;align-items:center;justify-content:center;
  color:var(--navy);font-family:var(--serif);font-weight:700;font-size:17px;
}
.chrome-mark{width:28px;height:28px;object-fit:contain;flex-shrink:0}
.chrome .brand small{font-weight:500;color:var(--gold-soft);font-size:11px;letter-spacing:.5px}
.chrome .demo-tag{
  font-size:10.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  background:rgba(212,175,55,.15);color:var(--gold-soft);
  padding:4px 10px;border-radius:99px;border:1px solid rgba(212,175,55,.3);
}
.chrome .spacer{flex:1}
.chrome .crumbs{font-size:13px;color:#94A3B8;display:flex;align-items:center;gap:8px}
.chrome .crumbs b{color:#fff;font-weight:600}
.chrome .reset-btn{
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);
  color:#E2E8F0;font-family:var(--sans);font-size:12.5px;font-weight:600;
  padding:7px 14px;border-radius:9px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:6px;
}
.chrome .reset-btn:hover{background:rgba(255,255,255,.14);color:#fff}

/* Stage */
#stage{flex:1;position:relative;overflow:hidden}
.screen{
  position:absolute;inset:0;overflow-y:auto;
  opacity:0;visibility:hidden;transform:translateY(8px);
  transition:opacity .35s ease,transform .35s ease;
}
.screen.active{opacity:1;visibility:visible;transform:none;z-index:1}

/* ====== REUSABLE LAYOUT ====== */
.portal{display:flex;min-height:100%;background:var(--bg)}
.sidebar{
  width:248px;flex-shrink:0;background:var(--navy);color:#CBD5E1;
  display:flex;flex-direction:column;padding:0;position:sticky;top:0;height:100vh;
}
.sidebar .s-brand{
  padding:20px 22px;display:flex;align-items:center;gap:10px;
  border-bottom:1px solid rgba(255,255,255,.07);
}
.sidebar .s-brand .mark{
  width:34px;height:34px;border-radius:9px;
  background:linear-gradient(135deg,var(--gold),var(--gold-deep));
  display:flex;align-items:center;justify-content:center;
  color:var(--navy);font-family:var(--serif);font-weight:700;font-size:18px;
}
.sidebar .s-brand .t{font-family:var(--sans);font-weight:800;color:#fff;font-size:14.5px;line-height:1.1}
.sidebar .s-brand .t small{display:block;font-weight:500;font-size:9.5px;letter-spacing:1.5px;color:var(--gold-soft);margin-top:2px}
.nav{padding:14px 12px;flex:1;overflow-y:auto}
.nav-label{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:#475569;padding:14px 12px 8px}
.nav a{
  display:flex;align-items:center;gap:11px;padding:9.5px 12px;border-radius:10px;
  color:#94A3B8;text-decoration:none;font-size:13.5px;font-weight:500;cursor:pointer;transition:.15s;margin-bottom:2px;
}
.nav a svg{width:18px;height:18px;flex-shrink:0;stroke-width:2}
.nav a:hover{background:rgba(255,255,255,.05);color:#E2E8F0}
.nav a.on{background:linear-gradient(90deg,rgba(212,175,55,.16),rgba(212,175,55,.04));color:#fff}
.nav a.on svg{color:var(--gold)}
.nav a .badge{margin-left:auto;background:var(--gold);color:var(--navy);font-size:10px;font-weight:800;padding:1px 7px;border-radius:99px}
.s-foot{padding:14px 18px;border-top:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:10px}
.s-foot .av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#475569,#1E293B);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;border:1.5px solid rgba(212,175,55,.4)}
.s-foot .nm{font-size:12.5px;font-weight:600;color:#E2E8F0;line-height:1.2}
.s-foot .nm small{display:block;color:#64748B;font-weight:500;font-size:10.5px}

.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{
  height:64px;flex-shrink:0;background:rgba(255,255,255,.85);backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);display:flex;align-items:center;gap:16px;padding:0 28px;position:sticky;top:0;z-index:50;
}
.topbar h1{font-size:19px;font-weight:700;letter-spacing:-.3px}
.topbar h1 small{display:block;font-size:12px;font-weight:500;color:var(--muted);letter-spacing:0}
.topbar .spacer{flex:1}
.searchbox{
  display:flex;align-items:center;gap:9px;background:var(--bg);border:1px solid var(--line);
  border-radius:10px;padding:8px 13px;width:280px;color:var(--muted);font-size:13px;
}
.searchbox svg{width:16px;height:16px}
.searchbox.live{padding:6px 13px}
.searchbox.live input{border:none;background:transparent;outline:none;font-family:var(--sans);font-size:13px;color:var(--navy);width:100%}
.searchbox.live input::placeholder{color:var(--muted)}
.searchbox.live:focus-within{border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,175,55,.12)}
/* wizard extras */
.fee-box{margin-top:20px;background:var(--bg);border:1px solid var(--line);border-radius:14px;padding:18px 20px;display:flex;align-items:center;justify-content:space-between}
.dropzone{border:2px dashed var(--line);border-radius:14px;padding:26px;display:flex;align-items:center;gap:16px;cursor:pointer;color:var(--muted);transition:.15s}
.dropzone:hover{border-color:var(--gold);background:#FBF7E9}
.dropzone svg{color:var(--gold-deep)}
.dropzone b{color:var(--navy);font-size:14px;display:block}
.review{border:1px solid var(--line);border-radius:14px;overflow:hidden}
.review .rev-row{display:flex;justify-content:space-between;padding:13px 18px;font-size:13.5px;border-bottom:1px solid var(--line-soft);color:var(--muted)}
.review .rev-row:last-child{border-bottom:none}
.review .rev-row b{color:var(--navy);font-weight:600}
.review .rev-row.total{background:var(--bg)}
.review .rev-row.total b{font-family:var(--serif);font-size:18px;color:var(--gold-deep)}
/* doc vault active category */
.card.cat-on{border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,175,55,.12)}
/* form error */
.field input.err,#li-email.err,#li-pass.err,#li-otp.err{border-color:var(--red)!important;box-shadow:0 0 0 3px rgba(220,38,38,.12)!important}
/* hearing control toggled off */
.hr-ctrl .cb.ctl-off .b{background:var(--red)!important;color:#fff}
.icon-btn{
  width:38px;height:38px;border-radius:10px;border:1px solid var(--line);background:var(--surface);
  display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--navy-3);position:relative;transition:.15s;
}
.icon-btn:hover{border-color:var(--gold);color:var(--navy)}
.icon-btn svg{width:18px;height:18px}
.icon-btn .dot{position:absolute;top:8px;right:9px;width:7px;height:7px;border-radius:50%;background:var(--red);border:1.5px solid var(--surface)}
.content{flex:1;padding:28px;overflow-y:auto}

/* ====== UI PRIMITIVES ====== */
.btn{
  font-family:var(--sans);font-weight:600;font-size:13.5px;border:none;cursor:pointer;
  padding:10px 18px;border-radius:10px;display:inline-flex;align-items:center;gap:8px;transition:.15s;white-space:nowrap;text-decoration:none;
}
.btn svg{width:16px;height:16px}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-deep));color:var(--navy);box-shadow:0 4px 14px -4px rgba(212,175,55,.5)}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 8px 20px -6px rgba(212,175,55,.6)}
.btn-navy{background:var(--navy);color:#fff}
.btn-navy:hover{background:var(--navy-2)}
.btn-ghost{background:var(--surface);color:var(--navy);border:1px solid var(--line)}
.btn-ghost:hover{border-color:var(--navy-3);background:var(--bg)}
.btn-sm{padding:7px 13px;font-size:12.5px}

.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.card-pad{padding:22px}

.chip{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:99px;white-space:nowrap}
.chip .d{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.9}
.chip-progress{background:var(--amber-soft);color:var(--amber)}
.chip-scheduled{background:var(--blue-soft);color:var(--blue)}
.chip-evidence{background:#EDE9FE;color:#7C3AED}
.chip-pending{background:#F1F5F9;color:#64748B}
.chip-closed{background:var(--emerald-soft);color:var(--emerald)}
.chip-assigned{background:var(--emerald-soft);color:var(--emerald)}
.chip-paid{background:var(--emerald-soft);color:var(--emerald)}
.chip-live{background:var(--red-soft);color:var(--red)}

table{width:100%;border-collapse:collapse}
thead th{text-align:left;font-size:11px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--muted-2);padding:0 18px 12px;border-bottom:1px solid var(--line)}
tbody td{padding:15px 18px;font-size:13.5px;border-bottom:1px solid var(--line-soft);color:var(--navy-2)}
tbody tr:last-child td{border-bottom:none}
tbody tr{transition:.12s;cursor:pointer}
tbody tr:hover{background:var(--bg)}
td .cid{font-weight:700;color:var(--navy)}
td .strong{font-weight:600;color:var(--navy)}

.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:24px}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:20px;position:relative;overflow:hidden;box-shadow:var(--shadow)}
.kpi .ic{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;margin-bottom:14px}
.kpi .ic svg{width:21px;height:21px;stroke-width:2}
.kpi .lbl{font-size:12.5px;color:var(--muted);font-weight:600}
.kpi .val{font-size:28px;font-weight:800;letter-spacing:-.5px;margin-top:3px;font-family:var(--serif)}
.kpi .trend{font-size:11.5px;font-weight:700;margin-top:7px;display:inline-flex;align-items:center;gap:3px}
.kpi .trend.up{color:var(--emerald)}
.kpi .trend.flat{color:var(--muted)}

.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-head h2{font-size:16px;font-weight:700;letter-spacing:-.2px}
.section-head h2 .sub,.muted{color:var(--muted);font-weight:500}
.link-gold{color:var(--gold-deep);font-weight:700;font-size:12.5px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:4px}
.link-gold:hover{color:var(--gold)}

/* clickable hint pulse */
.hot{position:relative}
.hot::after{content:"";position:absolute;inset:-3px;border-radius:inherit;box-shadow:0 0 0 0 rgba(212,175,55,.5);animation:pulse 2.4s infinite;pointer-events:none}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(212,175,55,.45)}70%{box-shadow:0 0 0 9px rgba(212,175,55,0)}100%{box-shadow:0 0 0 0 rgba(212,175,55,0)}}

/* Avatars */
.av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#fff;flex-shrink:0}
.av-c{background:linear-gradient(135deg,#3B82F6,#1D4ED8)}
.av-r{background:linear-gradient(135deg,#F59E0B,#D97706)}
.av-n{background:linear-gradient(135deg,#10B981,#059669)}
.av-a{background:linear-gradient(135deg,#8B5CF6,#6D28D9)}
.person{display:flex;align-items:center;gap:10px}
.person .meta b{font-size:13px;font-weight:600;display:block;color:var(--navy)}
.person .meta small{font-size:11.5px;color:var(--muted)}

/* progress steps */
.steps{display:flex;align-items:center;margin-bottom:30px}
.steps .st{display:flex;flex-direction:column;align-items:center;gap:7px;flex-shrink:0;width:84px;text-align:center}
.steps .num{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;background:var(--bg);color:var(--muted-2);border:2px solid var(--line);transition:.2s}
.steps .st.done .num{background:var(--emerald);border-color:var(--emerald);color:#fff}
.steps .st.cur .num{background:var(--navy);border-color:var(--navy);color:#fff;box-shadow:0 0 0 4px rgba(15,23,42,.1)}
.steps .lbl{font-size:11.5px;font-weight:600;color:var(--muted)}
.steps .st.cur .lbl,.steps .st.done .lbl{color:var(--navy)}
.steps .bar{flex:1;height:2px;background:var(--line);margin:0 -6px;margin-bottom:24px;position:relative;z-index:-0}
.steps .bar.fill{background:var(--emerald)}

.field{margin-bottom:18px}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--navy-2);margin-bottom:7px}
.field input,.field select,.field textarea{
  width:100%;font-family:var(--sans);font-size:13.5px;padding:11px 14px;border:1px solid var(--line);
  border-radius:10px;background:var(--surface);color:var(--navy);transition:.15s;
}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,175,55,.12)}
.field textarea{resize:vertical;min-height:80px}

/* donut/legend helpers */
.legend{display:flex;flex-direction:column;gap:11px}
.legend .lg{display:flex;align-items:center;gap:9px;font-size:13px}
.legend .lg .sw{width:11px;height:11px;border-radius:3px}
.legend .lg .v{margin-left:auto;font-weight:700;color:var(--navy)}

/* timeline */
.tl{position:relative;padding-left:28px}
.tl::before{content:"";position:absolute;left:9px;top:6px;bottom:6px;width:2px;background:var(--line)}
.tl .ev{position:relative;padding-bottom:22px}
.tl .ev:last-child{padding-bottom:0}
.tl .ev .dot{position:absolute;left:-28px;top:1px;width:20px;height:20px;border-radius:50%;background:var(--surface);border:2px solid var(--line);display:flex;align-items:center;justify-content:center}
.tl .ev.done .dot{background:var(--emerald);border-color:var(--emerald)}
.tl .ev.done .dot svg{width:11px;height:11px;color:#fff;stroke-width:3}
.tl .ev.cur .dot{background:var(--gold);border-color:var(--gold);animation:pulse 2s infinite}
.tl .ev .ti{font-size:13.5px;font-weight:700;color:var(--navy)}
.tl .ev .dt{font-size:11.5px;color:var(--muted-2);font-weight:600;margin-bottom:3px}
.tl .ev .ds{font-size:12.5px;color:var(--muted)}

/* doc rows */
.doc-row{display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--line);border-radius:11px;margin-bottom:10px;transition:.15s;cursor:pointer}
.doc-row:hover{border-color:var(--gold);background:#FFFEF8}
.doc-row .fic{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff}
.fic.pdf{background:#DC2626}.fic.doc{background:#2563EB}.fic.zip{background:#7C3AED}.fic.img{background:#059669}
.doc-row .nm{font-size:13px;font-weight:600;color:var(--navy)}
.doc-row .sz{font-size:11px;color:var(--muted)}

/* ====== HOMEPAGE (public marketing) ====== */
.pub{min-height:100%;background:#fff}
.pub-nav{height:72px;display:flex;align-items:center;gap:28px;padding:0 48px;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);z-index:60}
.pub-nav .lg{display:flex;align-items:center;gap:11px;font-weight:800;font-size:17px}
.pub-nav .lg .mark{width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg,var(--gold),var(--gold-deep));display:flex;align-items:center;justify-content:center;color:var(--navy);font-family:var(--serif);font-weight:700;font-size:19px}
.mark-img{width:42px;height:42px;object-fit:contain;flex-shrink:0}
.pub-nav .lg small{display:block;font-size:9px;font-weight:700;letter-spacing:1.2px;color:var(--gold-deep);margin-top:1px}
.pub-nav .links{display:flex;gap:26px;margin-left:18px}
.pub-nav .links a{font-size:13.5px;font-weight:500;color:var(--navy-2);text-decoration:none;cursor:pointer}
.pub-nav .links a:hover{color:var(--gold-deep)}
.pub-nav .spacer{flex:1}
.hero{position:relative;display:grid;grid-template-columns:1fr 1fr;align-items:stretch;background:var(--navy);overflow:hidden;min-height:540px}
.hero-text{display:flex;flex-direction:column;justify-content:center;padding:64px 56px;z-index:2}
.hero-eyebrow{font-family:var(--sans);font-size:clamp(15px,1.5vw,22px);font-weight:600;letter-spacing:.06em;color:#E2E8F0;margin-bottom:10px}
.hero-title{font-family:var(--serif);font-weight:700;color:#fff;line-height:.98;letter-spacing:-.01em;font-size:clamp(42px,6vw,92px);margin:0}
.hero-title .gold{color:var(--gold)}
.hero-rule{width:64px;height:3px;background:rgba(255,255,255,.35);margin:26px 0 24px;border-radius:2px}
.hero-sub{font-size:clamp(15px,1.3vw,19px);color:#CBD5E1;line-height:1.6;margin-bottom:32px}
.hero-btn{display:inline-flex;align-items:center;gap:14px;align-self:flex-start;background:linear-gradient(135deg,var(--gold),var(--gold-deep));color:#1a1206;font-weight:700;letter-spacing:.04em;font-size:14px;padding:15px 26px;border-radius:6px;cursor:pointer;text-transform:uppercase;transition:.18s;box-shadow:0 10px 30px -10px rgba(212,175,55,.6)}
.hero-btn:hover{transform:translateY(-2px);box-shadow:0 16px 40px -10px rgba(212,175,55,.75)}
.hero-btn .arr{transition:transform .18s}
.hero-btn:hover .arr{transform:translateX(4px)}
.hero-visual{position:relative;min-height:540px}
.hero-statue{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center top}
.hero-visual::before{content:"";position:absolute;inset:0;z-index:1;background:linear-gradient(90deg,var(--navy) 0%,rgba(15,23,42,.55) 14%,transparent 38%)}
.hero .float-card{position:absolute;background:rgba(255,255,255,.97);border-radius:13px;padding:12px 15px;box-shadow:0 16px 40px -12px rgba(0,0,0,.55);display:flex;align-items:center;gap:11px;z-index:3}
.hero .fc1{top:26px;right:26px}
.hero .fc2{bottom:34px;right:40px}
.hero .float-card .ic{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.hero .float-card b{font-size:13px;font-weight:700;color:var(--navy);display:block}
.hero .float-card small{font-size:11px;color:var(--muted)}
.stats-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--navy);padding:0;margin:0 48px;border-radius:18px;overflow:hidden;box-shadow:var(--shadow-lg);transform:translateY(-28px)}
.stats-strip .st{padding:26px 28px;display:flex;align-items:center;gap:15px}
.stats-strip .st .ic{font-size:26px}
.stats-strip .st .v{font-family:var(--serif);font-size:28px;font-weight:700;color:#fff;line-height:1}
.stats-strip .st .l{font-size:12px;color:var(--gold-soft);font-weight:600;margin-top:4px}
.svc{padding:24px 48px 64px}
.svc h2{font-family:var(--serif);font-size:34px;font-weight:600;letter-spacing:-.8px;text-align:center;color:var(--navy)}
.svc .lead{text-align:center;color:var(--muted);font-size:15px;margin:12px auto 40px;max-width:560px}
.svc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
.svc-card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:26px 22px;transition:.2s;cursor:default}
.svc-card:hover{border-color:var(--gold);transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.svc-card .ic{width:52px;height:52px;border-radius:13px;background:var(--navy);display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:16px}
.svc-card h3{font-size:17px;font-weight:700;color:var(--navy);margin-bottom:8px}
.svc-card p{font-size:13px;color:var(--muted);line-height:1.6}
.works{background:linear-gradient(180deg,#F8FAFC,#fff);padding:64px 48px;border-top:1px solid var(--line)}
.works h2{font-family:var(--serif);font-size:34px;font-weight:600;letter-spacing:-.8px;text-align:center;color:var(--navy);margin-bottom:44px}
.works-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;position:relative}
.work-step{text-align:center;position:relative}
.work-step .n{width:64px;height:64px;border-radius:50%;background:#fff;border:2px solid var(--gold);color:var(--gold-deep);font-family:var(--serif);font-weight:700;font-size:26px;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;box-shadow:var(--shadow)}
.work-step h4{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:7px}
.work-step p{font-size:12.5px;color:var(--muted);line-height:1.55;padding:0 8px}
.pub-foot{background:var(--navy);color:#94A3B8;padding:0;font-size:13px}
.foot-top{max-width:1200px;margin:0 auto;padding:54px 48px 40px;display:grid;grid-template-columns:1.4fr 2fr;gap:48px}
.foot-brand .fb-row{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.foot-mark{width:44px;height:44px;object-fit:contain;flex-shrink:0}
.fb-name{color:#fff;font-weight:800;font-size:17px;line-height:1.15}
.fb-name small{display:block;font-size:9px;font-weight:700;letter-spacing:1.2px;color:var(--gold-soft);margin-top:2px}
.foot-brand p{font-size:13px;line-height:1.7;color:#94A3B8;max-width:340px;margin-bottom:18px}
.fb-badges{display:flex;flex-wrap:wrap;gap:8px}
.fb-badges span{font-size:11px;font-weight:600;color:#CBD5E1;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);padding:5px 10px;border-radius:7px}
.foot-cols{display:grid;grid-template-columns:repeat(4,1fr);gap:24px}
.fcol h5{color:#fff;font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:14px}
.fcol a{display:block;color:#94A3B8;font-size:13px;text-decoration:none;cursor:pointer;margin-bottom:10px;transition:.15s}
.fcol a:hover{color:var(--gold-soft)}
.foot-bot{border-top:1px solid rgba(255,255,255,.08);max-width:1200px;margin:0 auto;padding:20px 48px;display:flex;align-items:center;justify-content:space-between;font-size:12.5px;color:#64748B}
.foot-conf{color:var(--gold-soft);font-weight:600}

/* ====== LOGIN ====== */
.login-wrap{min-height:100%;display:grid;grid-template-columns:1fr 1.1fr}
.login-art{background:linear-gradient(160deg,var(--navy),var(--navy-2));color:#fff;display:flex;flex-direction:column;justify-content:center;padding:56px 60px;position:relative;overflow:hidden}
.login-art .glow{position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(212,175,55,.22),transparent 70%);top:-80px;left:-80px}
.login-art .mark{width:54px;height:54px;border-radius:14px;background:linear-gradient(135deg,var(--gold),var(--gold-deep));display:flex;align-items:center;justify-content:center;color:var(--navy);font-family:var(--serif);font-weight:700;font-size:28px;margin-bottom:30px;position:relative}
.login-logo{height:50px;object-fit:contain;align-self:flex-start;margin-bottom:30px;position:relative}
.login-brandrow{display:flex;align-items:center;gap:13px;align-self:flex-start;margin-bottom:30px;position:relative}
.login-brandrow img{width:52px;height:52px;object-fit:contain}
.login-brandrow .lbt{color:#fff;font-weight:800;font-size:19px;line-height:1.1}
.login-brandrow .lbt small{display:block;font-size:9px;font-weight:700;letter-spacing:1.4px;color:var(--gold-soft);margin-top:3px}
.login-art h2{font-family:var(--serif);font-size:38px;font-weight:600;line-height:1.1;letter-spacing:-1px;position:relative}
.login-art p{font-size:15px;color:#94A3B8;margin-top:16px;max-width:340px;line-height:1.6;position:relative}
.login-art .pts{margin-top:32px;display:flex;flex-direction:column;gap:16px;position:relative}
.login-art .pts .p{display:flex;align-items:center;gap:13px;font-size:14px;color:#CBD5E1}
.login-art .pts .p .c{width:26px;height:26px;border-radius:50%;background:rgba(212,175,55,.18);display:flex;align-items:center;justify-content:center;color:var(--gold)}
.login-art .pts .p .c svg{width:14px;height:14px;stroke-width:3}
.login-form{display:flex;align-items:center;justify-content:center;padding:56px;background:#fff}
.login-card{width:100%;max-width:380px}
.login-card h3{font-family:var(--serif);font-size:28px;font-weight:600;color:var(--navy);letter-spacing:-.5px}
.login-card .sub{color:var(--muted);font-size:14px;margin:8px 0 26px}
.login-tabs{display:flex;gap:6px;background:var(--bg);padding:5px;border-radius:11px;margin-bottom:24px}
.login-tabs button{flex:1;padding:9px;border:none;background:transparent;font-family:var(--sans);font-weight:600;font-size:13px;color:var(--muted);border-radius:8px;cursor:pointer;transition:.15s}
.login-tabs button.on{background:#fff;color:var(--navy);box-shadow:var(--shadow)}
.login-card .row{display:flex;align-items:center;justify-content:space-between;margin:-4px 0 20px}
.login-card .row label{font-size:12.5px;color:var(--muted);display:flex;align-items:center;gap:7px}

/* hearing room */
.hr-wrap{min-height:100%;background:#0B1120;display:flex;flex-direction:column}
.hr-top{height:56px;display:flex;align-items:center;gap:14px;padding:0 22px;color:#fff;border-bottom:1px solid rgba(255,255,255,.08)}
.hr-top .cid{font-weight:700;font-size:14px}
.hr-top .sub{font-size:12.5px;color:#94A3B8}
.hr-top .rec{margin-left:auto;display:flex;align-items:center;gap:7px;font-size:12.5px;color:#FCA5A5;font-weight:600}
.hr-top .rec .d{width:8px;height:8px;border-radius:50%;background:var(--red);animation:pulse 1.5s infinite}
.hr-top .tm{font-variant-numeric:tabular-nums;font-weight:700;font-size:14px;color:#fff;background:rgba(255,255,255,.08);padding:5px 12px;border-radius:8px}
.hr-body{flex:1;display:grid;grid-template-columns:1fr 320px;gap:0;overflow:hidden}
.hr-stage{padding:20px;display:flex;flex-direction:column;gap:14px}
.hr-vids{flex:1;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:14px}
.hr-vid{border-radius:14px;overflow:hidden;position:relative;background:linear-gradient(135deg,#1E293B,#0F172A);display:flex;align-items:center;justify-content:center}
.hr-vid img{width:100%;height:100%;object-fit:cover}
.hr-vid .label{position:absolute;bottom:10px;left:10px;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);color:#fff;font-size:11.5px;font-weight:600;padding:4px 10px;border-radius:7px;display:flex;align-items:center;gap:6px}
.hr-vid .role{font-size:9.5px;font-weight:700;color:var(--gold-soft);text-transform:uppercase;letter-spacing:.5px}
.hr-vid .ph{width:70px;height:70px;border-radius:50%;background:linear-gradient(135deg,#475569,#334155);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:26px;color:#fff}
.hr-vid.neutral{border:2px solid var(--gold)}
.hr-ctrl{height:64px;background:rgba(255,255,255,.04);border-radius:14px;display:flex;align-items:center;justify-content:center;gap:14px}
.hr-ctrl .cb{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer}
.hr-ctrl .cb .b{width:46px;height:46px;border-radius:12px;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;color:#fff;transition:.15s}
.hr-ctrl .cb .b svg{width:20px;height:20px}
.hr-ctrl .cb:hover .b{background:rgba(255,255,255,.16)}
.hr-ctrl .cb small{font-size:9.5px;color:#94A3B8}
.hr-ctrl .cb.end .b{background:var(--red);width:auto;padding:0 22px;gap:8px;font-size:13px;font-weight:700}
.hr-side{background:#0F172A;border-left:1px solid rgba(255,255,255,.08);display:flex;flex-direction:column}
.hr-side-tabs{display:flex;border-bottom:1px solid rgba(255,255,255,.08)}
.hr-side-tabs button{flex:1;padding:14px;background:none;border:none;color:#94A3B8;font-family:var(--sans);font-weight:600;font-size:13px;cursor:pointer;border-bottom:2px solid transparent}
.hr-side-tabs button.on{color:#fff;border-bottom-color:var(--gold)}
.hr-chat{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:16px}
.hr-msg .who{font-size:11.5px;font-weight:700;color:var(--gold-soft);margin-bottom:4px}
.hr-msg .who small{color:#64748B;font-weight:500;margin-left:6px}
.hr-msg .bub{background:rgba(255,255,255,.06);color:#E2E8F0;font-size:13px;padding:10px 13px;border-radius:12px;border-top-left-radius:3px;line-height:1.5}
.hr-input{padding:14px;border-top:1px solid rgba(255,255,255,.08);display:flex;gap:9px}
.hr-input input{flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:10px 13px;color:#fff;font-family:var(--sans);font-size:13px}
.hr-input input::placeholder{color:#64748B}
.hr-input .snd{width:40px;height:40px;border-radius:10px;background:var(--gold);display:flex;align-items:center;justify-content:center;color:var(--navy);cursor:pointer;border:none}

/* generic two-col */
.grid-2{display:grid;grid-template-columns:1.4fr 1fr;gap:22px}
.grid-2b{display:grid;grid-template-columns:1fr 1fr;gap:22px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}

/* bars chart */
.bars{display:flex;align-items:flex-end;gap:14px;height:160px;padding-top:10px}
.bars .bgrp{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;height:100%;justify-content:flex-end}
.bars .bcol{width:100%;display:flex;gap:4px;align-items:flex-end;justify-content:center;height:100%}
.bars .b{width:14px;border-radius:5px 5px 0 0;transition:.3s}
.bars .bl{font-size:11px;color:var(--muted);font-weight:600}

/* line chart wrapper */
.linechart{width:100%;height:170px}

/* notice / award doc */
.legal-doc{background:#fff;border:1px solid var(--line);border-radius:12px;padding:30px 34px;font-size:13.5px;color:var(--navy-2);line-height:1.8}
.legal-doc h3{font-family:var(--serif);font-size:20px;text-align:center;color:var(--navy);margin-bottom:4px}
.legal-doc .ctr{text-align:center;color:var(--muted);font-size:12px;margin-bottom:22px}
.legal-doc .sig{margin-top:28px;border-top:1px dashed var(--line);padding-top:18px;display:flex;justify-content:space-between;align-items:flex-end}
.sig-name{font-family:var(--serif);font-style:italic;font-size:24px;color:var(--navy);border-bottom:1px solid var(--navy-3);padding-bottom:3px;margin-bottom:6px}

/* assign neutral list */
.neutral-row{display:flex;align-items:center;gap:14px;padding:14px;border:1px solid var(--line);border-radius:12px;margin-bottom:11px;cursor:pointer;transition:.15s}
.neutral-row:hover,.neutral-row.sel{border-color:var(--gold);background:#FFFEF8}
.neutral-row .radio{width:20px;height:20px;border-radius:50%;border:2px solid var(--line);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.neutral-row.sel .radio{border-color:var(--gold)}
.neutral-row.sel .radio::after{content:"";width:10px;height:10px;border-radius:50%;background:var(--gold)}
.rating{color:var(--gold);font-weight:700;font-size:12.5px;display:flex;align-items:center;gap:3px}

/* toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--navy);color:#fff;padding:14px 22px;border-radius:13px;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:12px;font-size:13.5px;font-weight:500;z-index:500;opacity:0;transition:.35s}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast .ic{width:28px;height:28px;border-radius:50%;background:var(--emerald);display:flex;align-items:center;justify-content:center}
.toast .ic svg{width:16px;height:16px;color:#fff;stroke-width:3}

.activity .a{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--line-soft)}
.activity .a:last-child{border:none}
.activity .a .di{width:30px;height:30px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px}
.activity .a .tx{font-size:12.5px;color:var(--navy-2);line-height:1.4}
.activity .a .tx b{font-weight:700;color:var(--navy)}
.activity .a .tm{font-size:11px;color:var(--muted-2);margin-top:2px}

.hamb{display:none;background:none;border:none;color:var(--navy);cursor:pointer;padding:6px;margin-right:2px;border-radius:8px}
.hamb:hover{background:var(--bg)}
@keyframes revealUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.reveal{animation:revealUp .5s both cubic-bezier(.22,1,.36,1)}
@keyframes livePulse{0%{box-shadow:0 0 0 0 rgba(220,38,38,.5)}70%{box-shadow:0 0 0 7px rgba(220,38,38,0)}100%{box-shadow:0 0 0 0 rgba(220,38,38,0)}}
.live-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--red);animation:livePulse 1.8s infinite}
@keyframes slideInMsg{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.hr-chat .hr-msg{animation:slideInMsg .3s both}
.nav-backdrop{display:none;position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:90;opacity:0;transition:.25s}

/* ===== TABLET ===== */
/* ===== LARGE / SMALL DESKTOP ===== */
@media(max-width:1180px){
  .grid-2{grid-template-columns:1fr}
}
@media(max-width:1024px){
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .svc-grid,.works-grid{grid-template-columns:repeat(2,1fr)}
  .grid-2,.grid-2b{grid-template-columns:1fr}
  .grid-3{grid-template-columns:repeat(2,1fr)}
  .foot-top{grid-template-columns:1fr;gap:32px}
  .hero-text{padding:54px 40px}
  .hero .float-card{transform:scale(.9)}
}

/* ===== TABLET & MOBILE (off-canvas sidebar) ===== */
@media(max-width:900px){
  /* chrome bar slims down */
  .chrome{height:50px;padding:0 14px;gap:10px}
  .chrome .demo-tag{display:none}
  .chrome .crumbs{display:none}
  .chrome .brand small{display:none}
  .chrome .reset-btn{padding:7px;font-size:0}
  .chrome .reset-btn svg{width:18px;height:18px}

  /* off-canvas sidebar */
  .hamb{display:flex;align-items:center}
  .portal{display:block}
  .sidebar{position:fixed;top:0;left:0;height:100vh;width:280px;max-width:84vw;z-index:100;transform:translateX(-100%);transition:transform .28s ease;box-shadow:0 0 40px rgba(0,0,0,.45)}
  .sidebar.open{transform:translateX(0)}
  .nav-backdrop.show{display:block;opacity:1}
  .main{width:100%}
  .topbar{height:auto;min-height:60px;padding:11px 16px;gap:12px}
  .topbar h1{font-size:17px}
  .topbar h1 small{font-size:11px}
  .topbar .searchbox{display:none}
  .content{padding:20px 18px}

  /* public site */
  .pub-nav{height:auto;padding:14px 20px;flex-wrap:wrap;gap:12px}
  .pub-nav .links{display:none}
  .pub-nav .lg{font-size:16px}
  .svc-grid,.works-grid{grid-template-columns:repeat(2,1fr)}
  .foot-cols{grid-template-columns:repeat(2,1fr)}

  /* tables scroll horizontally inside their card */
  .table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .table-scroll table{min-width:560px}

  /* hero: stack — statue on top as a band, text below */
  .hero{grid-template-columns:1fr;min-height:0}
  .hero-visual{order:-1;min-height:280px;height:42vw;max-height:380px}
  .hero-visual::before{background:linear-gradient(180deg,transparent 40%,rgba(15,23,42,.85) 100%)}
  .hero-statue{object-position:center 18%}
  .hero-text{padding:34px 28px 40px;text-align:left}
  .hero-btn{align-self:flex-start}
  .hero .float-card{transform:scale(.86)}
  .hero .fc1{top:18px;right:14px}
  .hero .fc2{bottom:14px;right:18px}
}

/* ===== PHONES ===== */
@media(max-width:600px){
  .content{padding:16px 14px}
  .topbar .icon-btn{width:36px;height:36px}

  /* grids fully stack */
  .kpi-grid,.grid-3,.grid-2,.grid-2b{grid-template-columns:1fr}
  .svc-grid,.works-grid{grid-template-columns:1fr}

  /* public site */
  .pub-nav{padding:12px 16px}
  .pub-nav .btn-sm{padding:7px 12px;font-size:12px}
  .stats-strip{grid-template-columns:repeat(2,1fr);margin:0 14px;transform:translateY(-20px)}
  .stats-strip .st{padding:16px 14px;gap:11px}
  .stats-strip .st .ic{font-size:22px}
  .stats-strip .st .v{font-size:23px}
  .svc{padding:8px 16px 36px}
  .svc h2,.works h2{font-size:26px}
  .foot-top{padding:34px 18px 26px;gap:28px}
  .foot-bot{flex-direction:column;gap:6px;align-items:flex-start;padding:18px 18px}
  .hero-visual{height:56vw;max-height:340px}
  .hero .fc1{top:14px;right:10px}
  .hero .fc2{display:none}
  .hero-text{padding:28px 20px 36px}

  /* login stacks, hide art panel */
  .login-wrap{grid-template-columns:1fr;min-height:auto}
  .login-art{display:none}
  .login-form{padding:28px 18px}
  .login-card{box-shadow:none;border:none;padding:0}

  /* wizard stepper scrolls horizontally */
  .steps{overflow-x:auto;padding-bottom:10px;gap:2px;margin:0 -4px 24px}
  .steps .st{width:62px;min-width:62px}
  .steps .lbl{font-size:9.5px;line-height:1.15}
  .steps .num{width:32px;height:32px;font-size:12px}
  .steps .bar{min-width:14px}

  /* cards & section heads */
  .card-pad{padding:16px}
  .section-head{flex-wrap:wrap;gap:8px}
  .section-head h2{font-size:15px}

  /* hearing room stacks */
  .hr-body{grid-template-columns:1fr;grid-template-rows:auto 320px}
  .hr-stage{padding:14px}
  .hr-vids{grid-template-columns:1fr 1fr;grid-template-rows:auto auto;gap:10px}
  .hr-vid{min-height:118px}
  .hr-side{height:320px;border-left:none;border-top:1px solid rgba(255,255,255,.08)}
  .hr-ctrl{flex-wrap:wrap;gap:10px;justify-content:center}
  .hr-ctrl .cb.end .b{padding:0 16px}
  .hr-top{flex-wrap:wrap;height:auto;padding:10px 14px;gap:4px 10px}
  .hr-top .cid{font-size:13px}

  /* generic: large numbers shrink a touch */
  .kpi .val{font-size:26px}
}

/* ===== SMALL PHONES ===== */
@media(max-width:400px){
  .content{padding:14px 12px}
  .card-pad{padding:14px}
  .stats-strip{grid-template-columns:1fr 1fr;margin:0 12px}
  .topbar h1{font-size:16px}
  .topbar h1 small{font-size:10.5px}
  .hero-visual{height:62vw;max-height:300px}
  .hero .float-card{display:none}
  .login-brandrow img{width:46px;height:46px}
  .kpi{padding:16px}
  .kpi .val{font-size:24px}
  .hr-vids{grid-template-columns:1fr 1fr}
  .btn{padding:10px 16px;font-size:13px}
  .foot-cols{grid-template-columns:1fr 1fr;gap:18px}
}

/* ===== VERY SMALL ===== */
@media(max-width:340px){
  .stats-strip{grid-template-columns:1fr}
  .hr-vids{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="app">
  <!-- Demo chrome -->
  <div class="chrome">
    <div class="brand">
      <img src="" id="chrome-mark" class="chrome-mark" alt="">
      <div>ODR Platform <small>by Imperial Tech Innovations</small></div>
    </div>

function donut(segs){ // segs: [{v, color}]
  let acc=0;const r=52,c=2*Math.PI*r;
  const parts=segs.map(s=>{const len=c*s.v/100;const dash=`${len} ${c-len}`;const off=-acc*c/100;acc+=s.v;return `<circle cx="70" cy="70" r="${r}" fill="none" stroke="${s.color}" stroke-width="18" stroke-dasharray="${dash}" stroke-dashoffset="${off}" transform="rotate(-90 70 70)"/>`}).join('');
  return `<svg viewBox="0 0 140 140" style="width:140px;height:140px">${parts}</svg>`;
}

let loginMode='email';
function setLoginMode(m){ loginMode=m; rerender('login'); }
function doLogin(role){
  const root=document.getElementById('scr-login');
  // basic validation on the visible fields
  if(loginMode==='email'){
    const em=root.querySelector('#li-email'), pw=root.querySelector('#li-pass');
    if(em && !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(em.value.trim())){ em.classList.add('err'); toast('Enter a valid email address'); em.focus(); return; }
    if(pw && pw.value.length<4){ pw.classList.add('err'); toast('Enter your password'); pw.focus(); return; }
  } else {
    const ph=root.querySelector('#li-otp');
    if(ph && ph.value.replace(/\D/g,'').length<4){ ph.classList.add('err'); toast('Enter the 6-digit OTP'); ph.focus(); return; }
  }
  DB.user=role;
  const dest={claimant:'claimant-dash',respondent:'respondent-dash',neutral:'neutral-dash',admin:'admin-dash'}[role];
  toast('Signed in successfully');
  setTimeout(()=>go(dest),500);
}

/* ============================================================
   FILE DISPUTE — real 6-step stateful wizard
   ============================================================ */
const WIZ_STEPS=['Claimant','Respondent','Dispute Details','Claim Amount','Evidence','Review & Pay'];
function wizSave(){
  const r=document.getElementById('scr-file-dispute'); if(!r) return;
  const g=id=>{const e=r.querySelector('#'+id);return e?e.value:undefined;};
  const d=DB.draft;
  if(g('w-cn')!==undefined)d.claimantName=g('w-cn'); if(g('w-ce')!==undefined)d.claimantEmail=g('w-ce'); if(g('w-cp')!==undefined)d.claimantPhone=g('w-cp');
  if(g('w-rn')!==undefined)d.respName=g('w-rn'); if(g('w-re')!==undefined)d.respEmail=g('w-re'); if(g('w-rp')!==undefined)d.respPhone=g('w-rp');
  if(g('w-cat')!==undefined)d.category=g('w-cat'); if(g('w-sub')!==undefined)d.subCategory=g('w-sub');
  if(g('w-desc')!==undefined)d.desc=g('w-desc'); if(g('w-relief')!==undefined)d.relief=g('w-relief');
  if(g('w-amt')!==undefined)d.amount=g('w-amt'); if(g('w-cur')!==undefined)d.currency=g('w-cur');
}
function wizNext(){
  wizSave();
  const d=DB.draft, s=d.step;
  // per-step validation
  if(s===1){ if(!d.claimantName.trim()){toast('Enter claimant name');return;} if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(d.claimantEmail.trim())){toast('Enter a valid claimant email');return;} }
  if(s===2){ if(!d.respName.trim()){toast('Enter respondent name');return;} }
  if(s===3){ if(!d.desc.trim()){toast('Describe the dispute');return;} }
  if(s===4){ if(!d.amount || isNaN(parseFloat(String(d.amount).replace(/[, ]/g,'')))){toast('Enter a valid claim amount');return;} }
  if(s<6){ d.step++; rerender('file-dispute'); toast('Step '+(d.step-1)+' saved'); }
}
function wizBack(){ wizSave(); if(DB.draft.step>1){DB.draft.step--; rerender('file-dispute');} else { go('claimant-dash'); } }
function wizAddFile(){
  const names=['Contract_Agreement.pdf','Invoice_Advance.pdf','Email_Thread.pdf','Delivery_Note.pdf','WhatsApp_Chat.pdf'];
  const f=names[DB.draft.files.length % names.length];
  const sizes=['2.4 MB','880 KB','1.2 MB','640 KB','410 KB'];
  DB.draft.files.push({nm:f,size:sizes[DB.draft.files.length % sizes.length]});
  rerender('file-dispute'); toast('Evidence attached');
}
function wizRemoveFile(i){ DB.draft.files.splice(i,1); rerender('file-dispute'); }
function wizSubmit(){
  const r=document.getElementById('scr-file-dispute');
  const agree=r&&r.querySelector('#w-agree'); 
  if(agree && !agree.checked){ toast('Please accept the declaration'); return; }
  const d=DB.draft;
  const id=nextCaseId();
  const amt=d.currency==='INR'?'₹':d.currency==='USD'?'$':'£';
  const newCase={id, claimant:d.claimantName, respondent:d.respName, status:'Unassigned', stKey:'pending', neutral:'—', updated:'Today', amount:amt+Number(String(d.amount).replace(/[, ]/g,'')).toLocaleString('en-IN'), cat:d.category};
  DB.cases.unshift(newCase);
  DB.notifications.unshift({sub:'Notice of Dispute — '+id, to:d.respName, type:'Email', st:'Queued', stKey:'pending', date:'Today', read:false});
  DB.lastFiled=id;
  toast('Dispute '+id+' filed & fee paid ✓');
  // reset draft for next time
  setTimeout(()=>{ DB.draft={step:1,claimantName:'John Doe',claimantEmail:'john.doe@email.com',claimantPhone:'+91 98765 43210',respName:'',respEmail:'',respPhone:'',category:'Commercial Dispute',subCategory:'Breach of Contract',desc:'',relief:'',amount:'',currency:'INR',files:[],agree:false}; go('claimant-case'); }, 800);
}
function wizStepper(cur){
  let h='<div class="steps">';
  WIZ_STEPS.forEach((lbl,i)=>{
    const n=i+1;
    const cls=n<cur?'done':n===cur?'cur':'';
    h+=`<div class="st ${cls}"><div class="num">${n<cur?svg(I.check,'width="16" height="16"'):n}</div><div class="lbl">${lbl}</div></div>`;
    if(i<WIZ_STEPS.length-1)h+=`<div class="bar ${n<cur?'fill':''}"></div>`;
  });
  return h+'</div>';
}

function wizFeeCalc(amount,cur){
  const n=parseFloat(String(amount||'').replace(/[, ]/g,''))||0;
  const fee=Math.round(n*0.02*1.18);
  const sym=cur==='USD'?'$':cur==='GBP'?'£':'₹';
  return {cur:sym, amtFmt:n.toLocaleString('en-IN'), feeFmt:fee.toLocaleString('en-IN')};
}
function wizFee(v){
  const el=document.getElementById('w-fee'); if(!el)return;
  const f=wizFeeCalc(v, (document.getElementById('w-cur')||{}).value||'INR');
  el.textContent = v? f.cur+f.feeFmt : '—';
}

let cmFilter='All', cmSearch='';
function cmSetFilter(f){ cmFilter=f; rerender('case-mgmt'); }
function cmSetSearch(v){ cmSearch=v.toLowerCase(); 
  const tb=document.getElementById('cm-tbody'); if(tb) tb.innerHTML=cmRows();
  const cnt=document.getElementById('cm-count'); if(cnt) cnt.textContent='Showing '+cmFiltered().length+' of '+DB.cases.length+' cases';
}
function cmFiltered(){
  return DB.cases.filter(c=>{
    const fOk = cmFilter==='All' || (cmFilter==='Pending'&&c.stKey==='pending') || (cmFilter==='Assigned'&&c.stKey==='assigned') || (cmFilter==='In Progress'&&['evidence','progress'].includes(c.stKey)) || (cmFilter==='Hearing'&&c.stKey==='scheduled') || (cmFilter==='Closed'&&c.stKey==='closed');
    const sOk = !cmSearch || (c.id+c.claimant+c.respondent+c.neutral+c.status).toLowerCase().includes(cmSearch);
    return fOk && sOk;
  });
}
function cmRows(){
  const rows=cmFiltered();
  if(!rows.length) return '<tr><td colspan="6" class="muted" style="text-align:center;padding:30px">No cases match your filters.</td></tr>';
  return rows.map(c=>`<tr onclick="openCase('${c.id}')"><td class="cid">${c.id}</td><td>${esc(c.claimant)}</td><td>${esc(c.respondent)}</td><td>${statusChip(c.stKey,c.status)}</td><td class="${c.neutral==='—'?'muted':''}">${esc(c.neutral)}</td><td class="muted">${c.updated}</td></tr>`).join('');
}
function openCase(id){
  const c=DB.cases.find(x=>x.id===id);
  if(c && c.stKey==='pending'){ DB.assignFor=id; go('assign-neutral'); }
  else if(c && c.stKey==='scheduled'){ go('hearing-room'); }
  else { go('claimant-case'); }
}

function hrSend(){
  const inp=document.querySelector('#scr-hearing-room #hr-input'); if(!inp) return;
  const v=inp.value.trim(); if(!v) return;
  inp.value='';
  const box=document.querySelector('#scr-hearing-room #hr-chat');
  if(box){ box.insertAdjacentHTML('beforeend', hrBubble({who:'Ananya Sharma (You)',role:'Neutral',t:nowTime(),m:v})); box.scrollTop=box.scrollHeight; }
}
function hrKey(e){ if(e.key==='Enter'){ e.preventDefault(); hrSend(); } }
function hrToggle(btn,onLabel,offLabel){
  btn.classList.toggle('ctl-off');
  const off=btn.classList.contains('ctl-off');
  const lab=btn.querySelector('small'); if(lab) lab.textContent=off?offLabel:onLabel;
  toast(off?offLabel:onLabel);
}
function hrBubble(c){
  return `<div class="hr-msg"><div class="who">${esc(c.who)} <small>${c.role} · ${c.t}</small></div><div class="bub">${esc(c.m)}</div></div>`;
}

   ============================================================ */
const crumbMap = {
  'home':'Public Website',
  'login':'Authentication',
  'claimant-dash':'Claimant ▸ Dashboard',
  'file-dispute':'Claimant ▸ File a Dispute',
  'claimant-case':'Claimant ▸ Case Details',
  'doc-vault':'Claimant ▸ Document Vault',
  'respondent-dash':'Respondent ▸ Dashboard',
  'neutral-dash':'Neutral ▸ Dashboard',
  'hearing-scheduler':'Neutral ▸ Schedule Hearing',
  'hearing-room':'Live Hearing Room',
  'mediation-room':'Private Mediation Room',
  'award':'Neutral ▸ Award Generation',
  'admin-dash':'Admin ▸ Dashboard',
  'case-mgmt':'Admin ▸ Case Management',
  'assign-neutral':'Admin ▸ Assign Neutral',
  'payment-dash':'Admin ▸ Payments',
  'analytics':'Admin ▸ Analytics',
  'notifications':'Admin ▸ Notifications',
  'mobile':'Responsive Views'
};

let current = null;
let hrTimer = null;

function htmlFor(id){ const h=screens[id].html; return (typeof h==='function')? h() : h; }
function go(id){
  if(!screens[id]){ console.warn('Unknown screen:',id); return; }
  const dynamic = (typeof screens[id].html==='function');
  // lazy-build the screen div on first visit; rebuild dynamic screens every visit
  let el = document.getElementById('scr-'+id);
  if(!el){
    el = document.createElement('div');
    el.id = 'scr-'+id;
    el.className = 'screen';
    el.innerHTML = htmlFor(id);
    stage.appendChild(el);
  } else if(dynamic){
    el.innerHTML = htmlFor(id);
  }
  // deactivate previous
  if(current){
    const prev = document.getElementById('scr-'+current);
    if(prev) prev.classList.remove('active');
  }
  el.classList.add('active');
  current = id;
  // breadcrumb
  crumbs.innerHTML = '<b>'+(crumbMap[id]||screens[id].label)+'</b>';
  // scroll resets
  window.scrollTo(0,0);
  const sc = el.querySelector('.content'); if(sc) sc.scrollTop = 0;
  // live hearing timer
  if(hrTimer){ clearInterval(hrTimer); hrTimer = null; }
  if(hrChatTimer){ clearInterval(hrChatTimer); hrChatTimer=null; }
  if(id==='hearing-room'){ startTimer(); startLiveChat(); }
  closeNav();
  onShow(id, el);
}

/* ---- dynamic on-show behaviours ---- */
function animateCount(node){
  const target=parseFloat(node.getAttribute('data-count'));
  const suffix=node.getAttribute('data-suffix')||'';
  const prefix=node.getAttribute('data-prefix')||'';
  const dur=900, t0=performance.now();
  const dec=(target%1!==0)?1:0;
  function step(t){
    const p=Math.min((t-t0)/dur,1);
    const e=1-Math.pow(1-p,3);
    const val=target*e;
    node.textContent=prefix+(dec?val.toFixed(1):Math.round(val).toLocaleString('en-IN'))+suffix;
    if(p<1)requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}
function onShow(id, el){
  // count-up any [data-count] nodes
  el.querySelectorAll('[data-count]').forEach(n=>animateCount(n));
  // staggered card entrance
  el.querySelectorAll('.reveal').forEach((c,i)=>{ c.style.animationDelay=(i*60)+'ms'; });
  // live activity ticker on admin dashboard
  if(actTimer){ clearInterval(actTimer); actTimer=null; }
  if(id==='admin-dash') startActivityFeed();
}
let actTimer=null;
const ACT_EVENTS=[
  {di:'var(--blue-soft)',e:'📁',b:'New case filed',t:'— ODR-2026-0'+(50+Math.floor(Math.random()*40))+' just now'},
  {di:'var(--emerald-soft)',e:'✅',b:'Settlement reached',t:'— mediation closed amicably'},
  {di:'#FEE2E2',e:'⚖️',b:'Hearing started',t:'— arbitration now live'},
  {di:'#EDE9FE',e:'💳',b:'Payment received',t:'— ₹'+(10+Math.floor(Math.random()*40))+',000 filing fee'},
  {di:'var(--amber-soft)',e:'👤',b:'Neutral assigned',t:'— expert matched to case'}
];
function startActivityFeed(){
  let i=0;
  actTimer=setInterval(()=>{
    const feed=document.querySelector('#scr-admin-dash #activity-feed');
    if(!feed){ clearInterval(actTimer); actTimer=null; return; }
    const ev=ACT_EVENTS[i%ACT_EVENTS.length]; i++;
    const row=document.createElement('div');
    row.className='a'; row.style.animation='slideInMsg .4s both';
    row.innerHTML=`<div class="di" style="background:${ev.di}">${ev.e}</div><div><div class="tx"><b>${ev.b}</b> ${ev.t}</div><div class="tm">just now</div></div>`;
    feed.insertBefore(row, feed.firstChild);
    while(feed.children.length>6) feed.removeChild(feed.lastChild);
  }, 5000);
}

function startTimer(){
  const t = document.querySelector('#scr-hearing-room #hr-timer');
  if(!t) return;
  let parts = (t.textContent||'01:30:36').split(':').map(Number);
  let secs = parts[0]*3600 + parts[1]*60 + parts[2];
  hrTimer = setInterval(()=>{
    secs++;
    const h = String(Math.floor(secs/3600)).padStart(2,'0');
    const m = String(Math.floor((secs%3600)/60)).padStart(2,'0');
    const s = String(secs%60).padStart(2,'0');
    const el = document.querySelector('#scr-hearing-room #hr-timer');
    if(el) el.textContent = h+':'+m+':'+s; else { clearInterval(hrTimer); hrTimer=null; }
  },1000);
}

let hrChatTimer=null;
const HR_AUTO=[
  {who:'John Doe',role:'Claimant',color:'#93C5FD',m:'Sharing the signed contract and the advance payment receipt now.'},
  {who:'Acme Corp Ltd.',role:'Respondent',color:'#FCD34D',m:'We dispute the delivery timeline — our dispatch records are attached.'},
  {who:'Ananya Sharma',role:'Neutral',color:'',m:'Thank you. I will review both sets of documents before issuing directions.'}
];
function startLiveChat(){
  let i=0;
  hrChatTimer=setInterval(()=>{
    const box=document.querySelector('#scr-hearing-room #hr-chat');
    if(!box){ clearInterval(hrChatTimer); hrChatTimer=null; return; }
    const c=HR_AUTO[i % HR_AUTO.length]; i++;
    const who=c.color?`<div class="who" style="color:${c.color}">${c.who} <small>${c.role} · ${nowTime()}</small></div>`:`<div class="who">${c.who} <small>${c.role} · ${nowTime()}</small></div>`;
    box.insertAdjacentHTML('beforeend', `<div class="hr-msg">${who}<div class="bub">${c.m}</div></div>`);
    box.scrollTop=box.scrollHeight;
    if(i>=6){ clearInterval(hrChatTimer); hrChatTimer=null; }
  }, 4200);
}

function openNav(){ const s=document.querySelector('#scr-'+current+' .sidebar'); const b=document.querySelector('#scr-'+current+' .nav-backdrop'); if(s)s.classList.add('open'); if(b)b.classList.add('show'); }
function closeNav(){ document.querySelectorAll('.sidebar.open').forEach(s=>s.classList.remove('open')); document.querySelectorAll('.nav-backdrop.show').forEach(b=>b.classList.remove('show')); }

let toastTimer = null;
function toast(msg){
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg || 'Done';
  t.classList.add('show');
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'),2600);
}

/* boot */
document.getElementById('chrome-mark').src = ASSET_MARK;
go('home');
